services:
  web:
    build:
      context: .
    image: student-workspace:local
    container_name: student-workspace
    restart: unless-stopped
    init: true
    ports:
      - "${STUDENT_WORKSPACE_BIND_IP:-0.0.0.0}:${STUDENT_WORKSPACE_PORT:-5002}:5002"
    environment:
      STUDENT_WORKSPACE_DATA_DIR: /data
      STUDENT_WORKSPACE_SECRET: "${STUDENT_WORKSPACE_SECRET:?請先執行 ./docker-start.sh 建立 .env}"
    volumes:
      - type: bind
        source: ./data
        target: /data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    user: "${HOST_UID:-10001}:${HOST_GID:-10001}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5002/healthz', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - classroom

networks:
  classroom:
    driver: bridge
