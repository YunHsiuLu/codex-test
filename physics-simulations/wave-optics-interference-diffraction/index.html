<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>光學干涉與繞射模擬</title>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="光學模擬畫布">
        <div class="stage-header">
          <div>
            <h1>光的雙狹縫干涉與單狹縫繞射</h1>
            <p>調整幾何與波長，觀察螢幕上的相對光強分佈。</p>
          </div>
          <div class="chip-group">
            <div class="mode-chip" id="modeChip">Double slit</div>
            <div class="mode-chip secondary" id="resultChip">Experiment</div>
          </div>
        </div>
        <canvas id="opticsCanvas" width="1040" height="680"></canvas>
      </section>

      <aside class="control-panel" aria-label="控制與讀值">
        <section class="panel-section">
          <h2>模式</h2>
          <div class="segmented-control" role="group" aria-label="模擬模式">
            <button class="segment active" id="doubleBtn" type="button">雙狹縫</button>
            <button class="segment" id="singleBtn" type="button">單狹縫</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>結果</h2>
          <div class="segmented-control" role="group" aria-label="結果類型">
            <button class="segment active" id="experimentBtn" type="button">實驗觀察</button>
            <button class="segment" id="theoryBtn" type="button">理論預測</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>參數</h2>
          <label class="control-row" for="wavelength">
            <span>波長</span>
            <input id="wavelength" type="range" min="380" max="700" value="532" step="1" />
            <output id="wavelengthOut" for="wavelength">532 nm</output>
          </label>
          <label class="control-row" for="slitWidth">
            <span>狹縫寬度</span>
            <input id="slitWidth" type="range" min="20" max="260" value="90" step="1" />
            <output id="slitWidthOut" for="slitWidth">90 um</output>
          </label>
          <label class="control-row double-only" for="slitSeparation">
            <span>狹縫間距</span>
            <input id="slitSeparation" type="range" min="80" max="760" value="320" step="1" />
            <output id="slitSeparationOut" for="slitSeparation">320 um</output>
          </label>
          <label class="control-row" for="screenDistance">
            <span>螢幕距離</span>
            <input id="screenDistance" type="range" min="0.4" max="4" value="1.6" step="0.05" />
            <output id="screenDistanceOut" for="screenDistance">1.60 m</output>
          </label>
        </section>

        <section class="panel-section">
          <h2>讀值</h2>
          <dl class="measurement-list">
            <div>
              <dt>中央亮紋寬度</dt>
              <dd id="centralWidth">0.00 mm</dd>
            </div>
            <div class="double-only">
              <dt>亮紋間距</dt>
              <dd id="fringeSpacing">0.00 mm</dd>
            </div>
            <div>
              <dt>第一暗紋位置</dt>
              <dd id="firstMinimum">0.00 mm</dd>
            </div>
            <div>
              <dt>最大相對光強</dt>
              <dd id="peakIntensity">1.00</dd>
            </div>
          </dl>
        </section>

        <section class="panel-section compact">
          <h2>模型</h2>
          <p class="formula" id="formulaText">I = cos²(beta) · sinc²(alpha)</p>
          <p class="note" id="modelNote">含有限對比、背景光與微小量測雜訊。</p>
        </section>
      </aside>
    </main>

    <script src="simulation.js?v=3"></script>
  </body>
</html>
