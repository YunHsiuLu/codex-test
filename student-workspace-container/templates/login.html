{% extends "base.html" %}
{% block title %}登入｜學生程式碼空間{% endblock %}
{% block body %}
<main class="login-shell">
  <section class="login-card">
    <div class="brand-mark">&lt;/&gt;</div>
    <p class="eyebrow">PROGRAMMING CLASS</p>
    <h1>學生程式碼空間</h1>
    <p class="muted">登入後即可管理自己的程式與作業檔案。</p>

    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="alert {{ category }}">{{ message }}</div>
    {% endfor %}

    <form method="post" class="stack-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>
        帳號
        <input name="username" autocomplete="username" required autofocus>
      </label>
      <label>
        密碼
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="primary-button">登入我的空間</button>
    </form>
    <p class="login-help">忘記帳號或密碼時，請聯絡授課教師。</p>
  </section>
</main>
{% endblock %}
