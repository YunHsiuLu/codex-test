# Enable pane selection, resizing, scrolling, and window switching by mouse.
set -g mouse on

# Let applications such as Codex detect when their pane loses focus.
set -g focus-events on

# Forward terminal bells instead of replacing them with tmux-only messages.
set -g visual-bell off
set -g bell-action any
setw -g monitor-bell on

# The first window in a new server may exist before after-new-window can run.
set-hook -g session-created[90] \
    'run-shell -d 0.2 "$HOME/.local/bin/tmux-tree --ensure-all"'
set-hook -g client-attached[90] \
    'run-shell -d 0.2 "$HOME/.local/bin/tmux-tree --ensure-all"'

# Prefix c creates a window, then adds its FILE TREE after tmux initializes it.
bind-key c new-window \; run-shell -d 0.2 "$HOME/.local/bin/tmux-tree --ensure-all"

# Always forward wheel events over FILE TREE or tmux-help instead of entering copy mode.
bind-key -T root WheelUpPane if-shell -F -t = '#{==:#{@tmux_tree},1}' \
    'send-keys -t = Up Up Up' \
    'if-shell -F -t = "#{==:#{pane_title},tmux-help}" "send-keys -t = PageUp" "if-shell -F \"#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}\" \"send-keys -M\" \"copy-mode -e\""'
bind-key -T root WheelDownPane if-shell -F -t = '#{==:#{@tmux_tree},1}' \
    'send-keys -t = Down Down Down' \
    'if-shell -F -t = "#{==:#{pane_title},tmux-help}" "send-keys -t = PageDown" "if-shell -F \"#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}\" \"send-keys -M\" \"send-keys -M\""'

# Recreate the file tree if it was manually closed.
bind-key F run-shell "$HOME/.local/bin/tmux-tree --ensure \"#{pane_id}\""

# Prefix H opens the three-pane guide layout and keeps the original pane focused.
bind-key H run-shell "$HOME/.local/bin/tmux-help"

# Prefix P opens the guide as a top-right popup.
bind-key P run-shell "$HOME/.local/bin/tmux-help --popup"
