<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台北捷運互動路線圖</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; color: #17212b; background: #edf2f5; }
    header { padding: 20px clamp(18px, 4vw, 48px) 12px; }
    h1 { margin: 0 0 4px; font-size: clamp(1.35rem, 2.5vw, 2rem); }
    header p { margin: 0; color: #5b6873; }
    .map-shell { position: relative; max-width: 1280px; margin: 0 auto 28px; overflow: hidden; border: 1px solid #cad5dc; border-radius: 16px; background: #fff; box-shadow: 0 12px 32px #23374618; }
    #metro-map { display: block; width: 100%; height: auto; }
    .route { display: none; }
    .station { cursor: pointer; }
    .station .hit-area { fill: transparent; }
    .station .dot { fill: transparent; stroke: transparent; stroke-width: 3; transition: fill .15s ease, stroke .15s ease; pointer-events: none; }
    .station:hover .dot, .station:focus .dot { fill: #ffe45caa; stroke: #17212b; }
    .station text, .line-badge { display: none; }
    #station-popup { position: fixed; z-index: 20; width: min(320px, calc(100vw - 28px)); padding: 16px 18px; border: 1px solid #b9c5cc; border-radius: 12px; background: #fff; box-shadow: 0 14px 38px #172b3a38; }
    #station-popup[hidden] { display: none; }
    #station-popup h2 { margin: 0 24px 6px 0; font-size: 1.2rem; }
    #station-popup p { margin: 0; line-height: 1.65; color: #44515a; }
    #station-popup button { position: absolute; top: 8px; right: 8px; width: 30px; height: 30px; border: 0; border-radius: 50%; background: transparent; font-size: 20px; cursor: pointer; }
    .legend { display: none; }
    @media (max-width: 1320px) { .map-shell { margin-inline: 10px; } }
    @media (max-width: 700px) { header { padding-top: 14px; } .map-shell { border-radius: 10px; } }
  </style>
</head>
<body>
  <header>
    <h1>台北捷運互動路線圖</h1>
    <p>點選站點查看資訊；地圖可隨視窗等比例縮放。</p>
  </header>
  <main class="map-shell">
    <svg id="metro-map" viewBox="0 0 1280 1741" role="img" aria-labelledby="map-title map-desc">
      <title id="map-title">台北捷運路線圖</title>
      <desc id="map-desc">台北捷運路線圖，可點選各站查看資訊。</desc>
      <image href="metrotaipeimap.jpg" width="1280" height="1741" preserveAspectRatio="none"></image>
      <g id="route-layer"></g>
      <g id="station-layer"></g>
      <g id="badge-layer"></g>
    </svg>
    <div class="legend" id="legend" aria-label="路線圖例"></div>
  </main>
  <aside id="station-popup" role="dialog" aria-live="polite" hidden>
    <button type="button" aria-label="關閉">×</button>
    <h2></h2><p></p>
  </aside>
  <script src="react_windows.js" type="module"></script>
</body>
</html>
